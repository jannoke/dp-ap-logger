name: Build for Rocky Linux 9

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: rockylinux:9

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y epel-release
          dnf install -y gcc-c++ make pkgconf-pkg-config mariadb-connector-c-devel mysql++-devel

      - name: Build
        run: make

      - name: Prepare release
        run: |
          mkdir -p release
          cp build/dp-ap-logger release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dp-ap-logger-rocky9
          path: release/dp-ap-logger

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release/dp-ap-logger
